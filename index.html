<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PACK DJ GRÁTIS • PRO</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle, rgba(0,255,200,0.08) 0%, transparent 70%),
        radial-gradient(circle, rgba(0,200,255,0.06) 0%, transparent 70%);
      background-size: 200% 200%;
      animation: neonBackground 25s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 420px;
      width: 92%;
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid rgba(0, 255, 200, 0.2);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 
        0 0 40px rgba(0, 255, 200, 0.15),
        0 0 80px rgba(0, 200, 255, 0.1);
      position: relative;
      z-index: 2;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(90deg, #00ffcc, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 15px;
      color: #00ffcc;
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      line-height: 1.2;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .highlight {
      color: #00ffcc;
      font-weight: 600;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 30px 0;
      text-align: left;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15.5px;
      color: #ddd;
    }

    .feature::before {
      content: '✓';
      color: #00ffcc;
      font-weight: bold;
      font-size: 18px;
    }

    .alert {
      background: rgba(255, 60, 60, 0.15);
      border: 1px solid rgba(255, 60, 60, 0.3);
      color: #ff6666;
      padding: 14px;
      border-radius: 12px;
      font-size: 14.5px;
      margin: 25px 0;
      font-weight: 600;
    }

    /* BOTÃO PRINCIPAL - MAIOR E MAIS AGRESSIVO */
    .btn {
      display: block;
      width: 100%;
      padding: 22px;
      margin: 20px 0 12px 0;
      border: none;
      border-radius: 16px;
      background: linear-gradient(90deg, #00ffcc, #00ff88);
      color: #000;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 0 30px rgba(0, 255, 200, 0.7),
        0 10px 30px rgba(0, 255, 140, 0.4);
      transition: all 0.3s ease;
      text-decoration: none;
      animation: pulseButton 2s infinite alternate ease-in-out;
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 
        0 0 50px rgba(0, 255, 200, 0.95),
        0 15px 40px rgba(0, 255, 140, 0.6);
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -100%;
      width: 50%;
      height: 200%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
      );
      transition: 0.7s;
    }

    .btn:hover::before {
      left: 250%;
    }

    /* Texto abaixo do botão */
    .download-count {
      font-size: 15px;
      color: #00ffcc;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* Texto pequeno no final */
    .final-info {
      font-size: 13px;
      color: #888;
      margin-top: 25px;
      opacity: 0.9;
    }

    @keyframes pulseButton {
      from { 
        box-shadow: 0 0 30px rgba(0, 255, 200, 0.7); 
      }
      to { 
        box-shadow: 0 0 55px rgba(0, 255, 200, 0.95); 
      }
    }

    @keyframes neonBackground {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @media (max-width: 480px) {
      .container { padding: 35px 25px; }
      h1 { font-size: 23px; }
      .btn { font-size: 18px; padding: 20px; }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">DJ PACK PRO</div>
    <div class="subtitle">EDITION 2026</div>

    <h1>PACK DJ GRÁTIS</h1>
    <p class="highlight">+1.200 MÚSICAS ATUALIZADAS • SEM VINHETA</p>

    <div class="features">
      <div class="feature">Qualidade profissional 320kbps</div>
      <div class="feature">Compatível com Serato, Rekordbox e Traktor</div>
    </div>

    <div class="alert">
      ⚠️ Link pode sair do ar a qualquer momento
    </div>

    <a href="https://chat.whatsapp.com/EyUdzh98eqc4mPFGMO7O4o" class="btn">
      👉 BAIXAR PACK GRÁTIS AGORA
    </a>

    <div class="download-count">
      🔥 +347 DJs já baixaram hoje
    </div>

    <div class="final-info">
      ✔ Acesso imediato pelo WhatsApp
    </div>
  </div>

</body>
</html>
